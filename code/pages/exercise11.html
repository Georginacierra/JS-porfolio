<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculatrice</title>

    <!-- css -->
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/exercise11.css" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- js -->
    <script src="../js/exercise11.js" defer></script>
  </head>
  <body>
    <header class="header">
      <nav class="nav container">
        <h1 class="logo">Georgina Cierra</h1>
        <ul class="nav-links">
          <li><a href="./index.html#mes-projects">&#8592 Mes projets</a></li>
        </ul>
      </nav>
    </header>

    <section class="exercise-box">
      <div class="container box-content">
        <div class="box-text">
          <h2>
            Calculatrice<br />
            <span class="text-primary">basique</span>
          </h2>

          <p>
            Voici une calculatrice performante. Effectue les calculs de ton choix : addition, soustraction, multiplication, division ou même les pourcentages.
          </p>
        </div>

        <div class="box-img">
          <img
            src="../assets/img/form.webp"
            alt="Illustration of man with counter"
          />
        </div>
      </div>
    </section>



<section class="cal-box">
    <div id="container" class="container">
      <p id="output"></p>

      <table id="table">
        <tr>
          <td>
            <input type="button" class="button button-special" value="CE" />
          </td>
          <td>
            <input type="button" class="button button-special" value="←" />
          </td>
          <td>
            <input type="button" class="button button-special" value="%" />
          </td>
          <td>
            <input type="button" class="button button-special" value="+" />
          </td>
        </tr>
        <tr>
          <td>
            <input type="button" class="button number" value="7" />
          </td>
          <td>
            <input type="button" class="button number" value="8" />
          </td>
          <td>
            <input type="button" class="button number" value="9" />
          </td>
          <td>
            <input type="button" class="button moins button-special" value="-" />
          </td>
        </tr>
        <tr>
          <td>
            <input type="button" class="button number" value="4" />
          </td>
          <td>
            <input type="button" class="button number" value="5" />
          </td>
          <td>
            <input type="button" class="button number" value="6" />
          </td>
          <td>
            <input type="button" class="button button-special" value="x" />
          </td>
        </tr>
        <tr>
          <td>
            <input type="button" class="button number" value="1" />
          </td>
          <td>
            <input type="button" class="button number" value="2" />
          </td>
          <td>
            <input type="button" class="button number" value="3" />
          </td>
          <td>
            <input type="button" class="button button-special" value="÷" />
          </td>
        </tr>
        <tr>
          <td>
            <input type="button" class="button number" value="0" />
          </td>
          <td>
            <div class="button number"></div>
          </td>
          <td>
            <input type="button" class="button number" value="." />
          </td>
          <td>
            <input type="button" class="button button-special" value="=" />
          </td>
        </tr>
      </table>
    </div>
  </section>
  
  <!-- footer -->
    <footer>
    <div class="footer-content">
    <p>&copy; 2026 Georgina <span class="text-primary">Cierra</span></p>

    </div>
  </footer>
  </body>
</html>
