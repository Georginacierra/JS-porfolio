<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liste de courses</title>

    <!-- css -->
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/exercise02.Css" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"

    />

    <!-- js -->

  <body>
    <header class="header">
      <nav class="nav container">
        <h1 class="logo">Georgina Cierra</h1>
        <ul class="nav-links">
          <li><a href="../index.html#mes-projects">&#8592 Mes projets</a></li>
        </ul>
      </nav>
    </header>

    <section class="exercise-box">
      <div class="container box-content">
        <div class="box-text">
          <h2>
            Liste de courses <br />
            <span class="text-primary">dynamique</span>
          </h2>

          <p>
            Voici l'exercice de la liste dynamique : ajoutez un article pour
            débuter la création de votre liste!
          </p>
        </div>

        <div class="box-img">
          <img
            src="../assets/img/liste-doddle.webp"
            alt="Illustration of woman with pink ice cream"
          />
        </div>
      </div>
    </section>

    <section class="list-box">
      <div class="content-list">
        <input type="text" id="item" placeholder="Ajouter ton item" />
        <button id="button" class="btn-primary">Ajouter</button>

        <div class="my-list">
          <h3>liste de courses</h3>
          <ol id="list"></ol>
        </div>
      </div>
    </section>

    <!-- footer -->
    <footer>
    <div class="footer-content">
