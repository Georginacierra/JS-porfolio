<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digicode</title>

    <!-- css -->
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/exercise12.css" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- js -->
    <script src="../js/exercise12.js" defer></script>
  </head>
  <body>
    <header class="header">
      <nav class="nav container">
        <h1 class="logo">Georgina Cierra</h1>
        <ul class="nav-links">
          <li><a href="../index.html#mes-projects">&#8592 Mes projets</a></li>
        </ul>
      </nav>
    </header>

    <section class="exercise-box">
      <div class="container box-content">
        <div class="box-text">
          <h2>
            Digicode<br />
            <span class="text-primary">basique</span>
          </h2>

          <p>
            Votre mission est de trouver le code secret pour entrer dans le musée du Louvre.<br>
            Attention : le code est composé de 4 chiffres uniquement. <br> <span class="text-primary">Vous avez 3 essais*</span>
          </p>
        </div>

        <div class="box-img">
          <img
            src="../assets/img/digicode-doddle.webp"
            alt="Illustration of man with counter"
          />
        </div>
      </div>
    </section>


    <section class="digi-box">
      <div class="code-pad">
        <div id="screen-result">
        <input type="password" value="" />
        <p id="message"></p>
      </div>
      <div id="keypad">
        <input type="button" value="0" />
        <input type="button" value="1" />
        <input type="button" value="2" />
        <input type="button" value="3" />
        <input type="button" value="4" />
        <input type="button" value="5" />
        <input type="button" value="6" />
        <input type="button" value="7" />
        <input type="button" value="8" />
        <input type="button" value="9" />
      </div>
      <button id="validate-button" class="btn-primary">Valider</button>
      </div>
    </section>

    <!-- footer -->
    <footer>
    <div class="footer-content">
    <p>&copy; 2026 Georgina <span class="text-primary">Cierra</span></p>
    <p>Illustrations : Open Doodles by <a href="https://www.opendoodles.com/" target="_blank">Pablo Stanley</a>.</p>
    </div>
  </footer>
  </body>
</html>
