<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barre de progression</title>

    <!-- css -->
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/exercise05.css" />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- js -->
    <script src="../js/exercise05.js" defer></script>
  </head>
  <body>
    <header class="header">
      <nav class="nav container">
        <h1 class="logo">Georgina Cierra</h1>
        <ul class="nav-links">
          <li><a href="./index.html#mes-projects">&#8592 Mes Mes projets</a></li>
        </ul>
      </nav>
    </header>

    <section class="exercise-box">
      <div class="container box-content">
        <div class="box-text">
          <h2>
            Barre de <br />
            <span class="text-primary">progression</span>
          </h2>

          <p>
            Voici la barre de progression dynamique : utilisez le bouton
            "Avancer" pour remplir la barre étape par étape.
          </p>
        </div>

        <div class="box-img">
          <img
            src="../assets/img/bar-doddle.webp"
            alt="Illustration of man with counter"
          />
        </div>
      </div>
    </section>

    <section class="bar-box">
      <label for="file">Progression du fichier&nbsp;:</label>
      <progress id="file" max="100" value="0">70%</progress>
      <button id="button-plus" class="btn-primary">click</button>
    </section>

    <!-- footer -->
    <footer>
    <div class="footer-content">
    <p>&copy; 2026 Georgina <span class="text-primary">Cierra</span></p>
    <p>Illustrations : Open Doodles by <a href="https://www.opendoodles.com/" target="_blank">Pablo Stanley</a>.</p>
    </div>
  </footer>
  </body>
</html>
